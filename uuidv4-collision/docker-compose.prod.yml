services:
  postgres:
    image: postgres:17-alpine
    container_name: uuidv4-collision-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB is required}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-45432}:5432"
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required} -d ${POSTGRES_DB:?POSTGRES_DB is required}"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: uuidv4-collision-web-prod
    restart: unless-stopped
    environment:
      DATABASE_URL: "${DATABASE_URL_DOCKER:?DATABASE_URL_DOCKER is required}"
      NODE_ENV: "production"
      NEXT_PUBLIC_GA_MEASUREMENT_ID: "${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}"
      GOOGLE_SITE_VERIFICATION: "${GOOGLE_SITE_VERIFICATION:-}"
    ports:
      - "${WEB_PORT:?WEB_PORT is required}:43000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: uuidv4-collision-worker-prod
    restart: unless-stopped
    command: ["pnpm", "worker"]
    environment:
      DATABASE_URL: "${DATABASE_URL_DOCKER:?DATABASE_URL_DOCKER is required}"
      NODE_ENV: "production"
      WORKER_INTERVAL_MS: "${WORKER_INTERVAL_MS:?WORKER_INTERVAL_MS is required}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-prod-data:
