services:
  postgres:
    image: postgres:17-alpine
    container_name: uuidv4-collision-postgres
    environment:
      POSTGRES_DB: uuidv4_collision
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-45432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uuidv4_collision"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
    container_name: uuidv4-collision-web
    command: ["pnpm", "dev", "--hostname", "0.0.0.0"]
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/uuidv4_collision"
    ports:
      - "${WEB_PORT:-43000}:43000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

  worker:
    build:
      context: .
    container_name: uuidv4-collision-worker
    command: ["pnpm", "worker"]
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/uuidv4_collision"
      WORKER_INTERVAL_MS: "1000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres-data:
