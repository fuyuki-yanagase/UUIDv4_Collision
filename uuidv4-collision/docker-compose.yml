services:
  postgres:
    image: postgres:17-alpine
    container_name: uuidv4-collision-postgres
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB is required}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    ports:
      - "${POSTGRES_PORT:?POSTGRES_PORT is required}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required} -d ${POSTGRES_DB:?POSTGRES_DB is required}"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
    container_name: uuidv4-collision-web
    command: ["pnpm", "dev", "--hostname", "0.0.0.0"]
    environment:
      DATABASE_URL: "${DATABASE_URL_DOCKER:?DATABASE_URL_DOCKER is required}"
      NEXT_PUBLIC_GA_MEASUREMENT_ID: "${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}"
      GOOGLE_SITE_VERIFICATION: "${GOOGLE_SITE_VERIFICATION:-}"
    ports:
      - "${WEB_PORT:?WEB_PORT is required}:43000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

  worker:
    build:
      context: .
    container_name: uuidv4-collision-worker
    command: ["pnpm", "worker"]
    environment:
      DATABASE_URL: "${DATABASE_URL_DOCKER:?DATABASE_URL_DOCKER is required}"
      WORKER_INTERVAL_MS: "${WORKER_INTERVAL_MS:?WORKER_INTERVAL_MS is required}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres-data:
